name: Fetch Encrypted Secrets

on:
  workflow_call:
    inputs:
      zip_url_json:
        required: true
        type: string

jobs:
  download-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo systemctl start tailscaled || sudo tailscaled --tun=userspace-networking --socks5-server=localhost:1055 >/dev/null 2>&1 &
      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey '${{ secrets.TS_AUTHKEY }}' --accept-dns=true --accept-routes=false --ssh=false
          tailscale status
      - name: Check RDGen over MagicDNS
        run: |
          curl -sSf -m 10 http://boris-pc1.tailb83774.ts.net:8000/generator >/dev/null
      - name: Download with Retry
        uses: nick-fields/retry@v3
        with:
          retry_wait_seconds: 60
          timeout_minutes: 10
          max_attempts: 5
          shell: python
          command: |
            import requests
            import json
            import time

            input_data = json.loads('${{ inputs.zip_url_json }}')
            url = f"{input_data['url']}/get_zip?filename={input_data['file']}"
            
            for attempt in range(5):
                try:
                    print(f"Downloading (Attempt {attempt + 1})...")
                    r = requests.get(url, timeout=120)
                    r.raise_for_status()
                    with open('secrets.zip', 'wb') as f:
                        f.write(r.content)
                    break
                except Exception as e:
                    if attempt < 4:
                        time.sleep(5 * (2 ** attempt))
                    else: raise e

      - name: Upload Encrypted Artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-secrets-zip
          path: secrets.zip
          retention-days: 1